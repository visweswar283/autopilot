services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jobassistant
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jobassistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ml_models:/root/.cache   # cache downloaded models between restarts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  scraper:
    build: ./workers
    env_file: .env
    environment:
      - TARGET_ROLES=Software Engineer,Backend Engineer,Full Stack Engineer
      - TARGET_LOCATIONS=Remote,San Francisco,New York
      - MIN_SALARY=120000
      - SCRAPER_INTERVAL_HOURS=2
      - HEADLESS=true
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - scraper_sessions:/app   # persist LinkedIn cookies between runs
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  pgdata:
  grafana_data:
  scraper_sessions:
  ml_models:
