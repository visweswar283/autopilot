global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # add alertmanager host here when configured

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:8080"]

  - job_name: "ml-service"
    static_configs:
      - targets: ["ml-service:8001"]
